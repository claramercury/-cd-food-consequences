; ============================================================
;  cd_food_consequences.ini
;  Crimson Desert — Food Consequences Mod — Config
;  Autor: claramercury
; ============================================================

[General]
Enabled=1
LogEnabled=1

; ─── Frescura ────────────────────────────────────────────────
[Fresh]
; Activar el sistema de decay de frescura en el inventario
Enabled=1
; Pérdida de frescura por segundo en condiciones normales (0.0–1.0)
DecayRateNormal=0.02
; Pérdida de frescura por segundo cuando hace calor
DecayRateHot=0.05
; Temperatura a partir de la cual se usa DecayRateHot
TempThreshold=35.0
; Frescura por debajo de la cual el alimento está "en mal estado"
ThresholdStale=0.50
; Frescura por debajo de la cual el alimento está "podrido"
ThresholdRotten=0.20

; ─── Efectos — comida en mal estado ─────────────────────────
[StaleFood]
Enabled=1
; Probabilidad de envenenar al consumir (0.0–1.0)
PoisonChance=0.30
; Probabilidad de causar confusión
ConfusionChance=0.20
; Penalización a Morale (valor negativo)
MoralePenalty=-10.0

; ─── Efectos — comida podrida ───────────────────────────────
[RottenFood]
Enabled=1
PoisonChance=0.80
; Probabilidad de causar estado de coma (raro)
ComatoseChance=0.15
MoralePenalty=-25.0

; ─── Límite de curaciones en combates de jefe ───────────────
[BossLimits]
Enabled=1
; Máximo de items curativos usables durante un combate de jefe
MaxHealItemsPerBoss=3
